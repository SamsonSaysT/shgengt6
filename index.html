<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OBS Countdown Timer</title>

  <style>
    @font-face {
      font-family: "Pricedown";
      src: url("./Pricedown Bl.otf") format("opentype");
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      --text-color: #ffffff;
      --font-size: 86px;
      --letter-spacing: 0.04em;
      --text-stroke: 0px #000000;
      --shadow: 0 0 0 transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent !important;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Pricedown", Impact, Haettenschweiler, "Arial Black", sans-serif;
      color: var(--text-color);
    }

    #countdown {
      font-size: var(--font-size);
      line-height: 1;
      letter-spacing: var(--letter-spacing);
      white-space: nowrap;
      text-align: center;
      text-transform: uppercase;
      paint-order: stroke fill;
      -webkit-text-stroke: var(--text-stroke);
      text-shadow: var(--shadow);
      font-variant-numeric: tabular-nums;
      user-select: none;
    }

    .expired {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main id="countdown" aria-live="polite">Loading...</main>

  <script>
    // Detroit / Eastern Time on Nov 18, 2026 is UTC-05:00.
    const TARGET_TIME = new Date("2026-11-18T23:59:00-05:00").getTime();

    const countdownEl = document.getElementById("countdown");

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = Date.now();
      let remaining = TARGET_TIME - now;

      if (remaining <= 0) {
        countdownEl.textContent = "00 DAYS 00 HOURS 00 MINUTES 00 SECONDS";
        countdownEl.classList.add("expired");
        return;
      }

      const totalSeconds = Math.floor(remaining / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      countdownEl.textContent = `${days} DAYS ${pad(hours)} HOURS ${pad(minutes)} MINUTES ${pad(seconds)} SECONDS`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
