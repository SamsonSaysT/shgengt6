<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OBS Countdown Timer</title>

  <style>
    @font-face {
      font-family: "PricedownOBS";
      src: url("./Pricedown Bl.otf") format("opentype");
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      --text-color: #ffffff;
      --base-font-size: 120px;
      --letter-spacing: 0.035em;
      --safe-padding: 16px;
      --text-stroke: 0px #000000;
      --shadow: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      background-color: transparent;
    }

    #stage {
      position: fixed;
      inset: 0;
      box-sizing: border-box;
      padding: var(--safe-padding);
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      overflow: hidden;
    }

    #timer {
      font-family: "PricedownOBS", Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: var(--base-font-size);
      line-height: 0.85;
      letter-spacing: var(--letter-spacing);
      color: var(--text-color);
      white-space: nowrap;
      text-align: center;
      text-transform: uppercase;
      transform-origin: center center;
      -webkit-text-stroke: var(--text-stroke);
      text-shadow: var(--shadow);
      will-change: transform;
      user-select: none;
    }
  </style>
</head>

<body>
  <main id="stage" aria-label="Countdown timer">
    <div id="timer">Loading countdown...</div>
  </main>

  <script>
    // Countdown target:
    // November 18, 2026 at 11:59 PM Eastern/Detroit time.
    const TARGET_TIME = new Date("2026-11-18T23:59:00-05:00").getTime();

    const stage = document.getElementById("stage");
    const timer = document.getElementById("timer");

    function pad2(number) {
      return String(number).padStart(2, "0");
    }

    function getCountdownText() {
      const now = Date.now();
      let remaining = TARGET_TIME - now;

      if (remaining <= 0) {
        return "00 DAYS 00 HOURS 00 MINUTES 00 SECONDS";
      }

      const totalSeconds = Math.floor(remaining / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return `${days} DAYS ${pad2(hours)} HOURS ${pad2(minutes)} MINUTES ${pad2(seconds)} SECONDS`;
    }

    function fitTimerToWindow() {
      // Reset first so scrollWidth/scrollHeight measure the natural text size.
      timer.style.transform = "scale(1)";

      const stageRect = stage.getBoundingClientRect();
      const availableWidth = Math.max(1, stageRect.width - 2);
      const availableHeight = Math.max(1, stageRect.height - 2);

      const textWidth = Math.max(1, timer.scrollWidth);
      const textHeight = Math.max(1, timer.scrollHeight);

      const scale = Math.min(
        availableWidth / textWidth,
        availableHeight / textHeight
      );

      timer.style.transform = `scale(${scale})`;
    }

    function updateTimer() {
      timer.textContent = getCountdownText();
      requestAnimationFrame(fitTimerToWindow);
    }

    updateTimer();
    setInterval(updateTimer, 250);

    window.addEventListener("resize", fitTimerToWindow);

    if ("ResizeObserver" in window) {
      new ResizeObserver(fitTimerToWindow).observe(stage);
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        updateTimer();
        fitTimerToWindow();
      });
    }
  </script>
</body>
</html>
