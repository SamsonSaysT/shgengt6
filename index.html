<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GTA VI Countdown</title>
  <style>
    @font-face {
      font-family: "PricedownOBS";
      src: url("Pricedown Bl.otf") format("opentype");
      font-display: block;
    }

    :root {
      --text-color: #ffffff;
      --title-size: 96px;
      --timer-size: 112px;
      --line-gap: 24px;
      --fit-width: 94vw;
      --fit-height: 88vh;
      --shadow: 0 0 0 transparent;
      --stroke-size: 0px;
      --stroke-color: #000000;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: "PricedownOBS", Impact, Haettenschweiler, "Arial Black", sans-serif;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    #countdown-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      text-align: center;
      color: var(--text-color);
      text-shadow: var(--shadow);
      -webkit-text-stroke: var(--stroke-size) var(--stroke-color);
      white-space: nowrap;
      width: max-content;
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    #title {
      font-size: var(--title-size);
      line-height: 0.95;
      margin-bottom: var(--line-gap);
      letter-spacing: 0.015em;
    }

    #timer {
      font-size: var(--timer-size);
      line-height: 0.95;
      letter-spacing: 0.015em;
    }
  </style>
</head>
<body>
  <div id="stage" aria-hidden="true">
    <div id="countdown-wrap">
      <div id="title">GTA VI Countdown</div>
      <div id="timer">Loading...</div>
    </div>
  </div>

  <script>
    // Target: November 18, 2026 at 11:59 PM Eastern time.
    // Detroit / Eastern is UTC-5 on this date.
    const TARGET_TIME = new Date("2026-11-18T23:59:00-05:00").getTime();

    const stage = document.getElementById("stage");
    const wrap = document.getElementById("countdown-wrap");
    const timer = document.getElementById("timer");

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = Date.now();
      const remainingMs = Math.max(0, TARGET_TIME - now);
      const totalSeconds = Math.floor(remainingMs / 1000);

      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      const dayLabel = days === 1 ? "Day" : "Days";
      timer.textContent = `${days} ${dayLabel} ${hours}:${pad2(minutes)}:${pad2(seconds)}`;

      fitCountdown();
    }

    function fitCountdown() {
      // Reset transform before measuring the natural content size.
      wrap.style.transform = "translate(-50%, -50%) scale(1)";

      const availableWidth = stage.clientWidth * 0.94;
      const availableHeight = stage.clientHeight * 0.88;
      const contentWidth = wrap.scrollWidth;
      const contentHeight = wrap.scrollHeight;

      if (!contentWidth || !contentHeight || !availableWidth || !availableHeight) return;

      const scale = Math.min(availableWidth / contentWidth, availableHeight / contentHeight, 1);
      wrap.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    window.addEventListener("resize", fitCountdown);

    // Re-fit after the uploaded font finishes loading.
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        updateCountdown();
        fitCountdown();
      });
    }

    updateCountdown();
    setInterval(updateCountdown, 250);
  </script>
</body>
</html>
