<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GTA VI Countdown</title>
  <style>
    @font-face {
      font-family: "PricedownCustom";
      src: url("Pricedown Bl.otf") format("opentype");
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      --text-color: #ffffff;
      --stroke-size: 0px;
      --stroke-color: #000000;
      --shadow: 0 0 0 transparent;

      /* Edit these if you want the title/timer relationship different. */
      --title-size: 92px;
      --timer-size: 108px;
      --line-gap: 18px;
      --side-padding: 72px;
      --top-padding: 48px;
      --bottom-padding: 48px;
      --scale: 1;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent !important;
    }

    body {
      display: grid;
      place-items: center;
      font-family: "PricedownCustom", Impact, Haettenschweiler, "Arial Black", sans-serif;
      color: var(--text-color);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: transparent !important;
    }

    /* The text is centered once, then scaled as a whole from a fixed template.
       That keeps both lines locked in place instead of resizing on every tick. */
    #fitLayer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(var(--scale));
      transform-origin: center center;
      width: max-content;
      text-align: center;
      white-space: nowrap;
      user-select: none;
      pointer-events: none;
      padding: var(--top-padding) var(--side-padding) var(--bottom-padding);
      box-sizing: border-box;
    }

    .title,
    .timer {
      font-weight: normal;
      line-height: 0.9;
      letter-spacing: 0.035em;
      color: var(--text-color);
      -webkit-text-stroke: var(--stroke-size) var(--stroke-color);
      text-shadow: var(--shadow);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1, "kern" 0;
    }

    .title {
      font-size: var(--title-size);
      margin: 0 0 var(--line-gap);
    }

    .timer {
      font-size: var(--timer-size);
      margin: 0;
      display: inline-grid;
      grid-auto-flow: column;
      align-items: baseline;
      justify-content: center;
      gap: 0.22em;
    }

    /* Fixed number slots stop the line from jumping when 9H becomes 10H, etc. */
    .num {
      display: inline-block;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1, "kern" 0;
    }

    #days { width: 3.25ch; }
    #hours { width: 2.15ch; }
    #minutes { width: 2.15ch; }
    #seconds { width: 2.15ch; }

    .unit {
      display: inline-block;
    }

    /* Hidden measuring layer uses the longest expected text, not the live countdown. */
    #measure {
      position: absolute;
      visibility: hidden;
      pointer-events: none;
      left: -99999px;
      top: -99999px;
      width: max-content;
      text-align: center;
      white-space: nowrap;
      padding: var(--top-padding) var(--side-padding) var(--bottom-padding);
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="GTA VI countdown timer">
    <section id="fitLayer">
      <h1 class="title">GTA VI Countdown</h1>
      <p class="timer" aria-live="off">
        <span id="days" class="num">148</span><span class="unit">Days</span>
        <span id="hours" class="num">5</span><span class="unit">H</span>
        <span id="minutes" class="num">03</span><span class="unit">M</span>
        <span id="seconds" class="num">00</span><span class="unit">S</span>
      </p>
    </section>

    <section id="measure" aria-hidden="true">
      <h1 class="title">GTA VI Countdown</h1>
      <p class="timer">
        <span class="num" style="width:3.25ch">888</span><span class="unit">Days</span>
        <span class="num" style="width:2.15ch">23</span><span class="unit">H</span>
        <span class="num" style="width:2.15ch">59</span><span class="unit">M</span>
        <span class="num" style="width:2.15ch">59</span><span class="unit">S</span>
      </p>
    </section>
  </main>

  <script>
    // Countdown target: Nov 18, 2026 at 11:59 PM Eastern / Detroit time.
    const TARGET_TIME = new Date("2026-11-18T23:59:00-05:00").getTime();

    // Set to false if you want exactly: "148 Days 5H 03M"
    const SHOW_SECONDS = true;

    const els = {
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      fitLayer: document.getElementById("fitLayer"),
      measure: document.getElementById("measure")
    };

    function twoDigits(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = Date.now();
      const remaining = Math.max(0, TARGET_TIME - now);

      const totalSeconds = Math.floor(remaining / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      els.days.textContent = String(days);
      els.hours.textContent = String(hours);       // no leading zero on hours
      els.minutes.textContent = twoDigits(minutes); // leading zero on minutes
      els.seconds.textContent = twoDigits(seconds); // leading zero on seconds
    }

    function setSecondsVisibility() {
      const secondsNum = els.seconds;
      const secondsUnit = secondsNum.nextElementSibling;
      secondsNum.style.display = SHOW_SECONDS ? "inline-block" : "none";
      secondsUnit.style.display = SHOW_SECONDS ? "inline-block" : "none";

      const measureTimer = els.measure.querySelector(".timer");
      const measureParts = measureTimer.children;
      measureParts[6].style.display = SHOW_SECONDS ? "inline-block" : "none";
      measureParts[7].style.display = SHOW_SECONDS ? "inline-block" : "none";
    }

    function fitToWindow() {
      const margin = 0.96;
      const naturalWidth = els.measure.offsetWidth;
      const naturalHeight = els.measure.offsetHeight;
      const availableWidth = window.innerWidth * margin;
      const availableHeight = window.innerHeight * margin;
      const scale = Math.min(availableWidth / naturalWidth, availableHeight / naturalHeight, 1);
      document.documentElement.style.setProperty("--scale", String(scale));
    }

    async function init() {
      setSecondsVisibility();
      updateCountdown();

      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }

      fitToWindow();
      updateCountdown();
      setInterval(updateCountdown, 250);
    }

    window.addEventListener("resize", fitToWindow);
    window.addEventListener("orientationchange", fitToWindow);
    init();
  </script>
</body>
</html>
